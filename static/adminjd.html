<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ryder Admin</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
    <script defer src="/static/admin.js"></script>
    <style>
        body { font-family: 'Roboto', Arial, sans-serif; background: #f3f7ff; margin: 0; }
        .admin-container { max-width: 700px; margin: 2rem auto; background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); padding: 2rem 1rem; }
        h1 { text-align: center; color: #2563eb; }
        .tab-bar { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 2px solid #e5e7eb; padding-bottom: 0; }
        .tab-btn { padding: 8px 20px; border: none; background: none; cursor: pointer; font-size: 1rem; border-bottom: 3px solid transparent; margin-bottom: -2px; color: #6b7280; }
        .tab-btn.active { border-bottom-color: #2563eb; color: #2563eb; font-weight: 600; }
        .section { display: none; margin-bottom: 2.5rem; }
        .section.active { display: block; }
        .section h2 { color: #1741a6; margin-bottom: 0.5rem; }
        label { display: block; margin: 0.5rem 0 0.2rem 0; }
        input, select { width: 100%; padding: 0.5rem; margin-bottom: 0.7rem; border-radius: 6px; border: 1px solid #bbb; }
        button { background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 0.6rem 1.5rem; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 0.5rem; }
        button:hover { background: #1741a6; }
        ul { list-style: none; padding: 0; }
        li { background: #f3f7ff; border-radius: 8px; padding: 0.5rem 1rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
        .actions button { margin-left: 0.5rem; background: #e53e3e; }
        .actions button.edit { background: #38a169; }
        .actions button.edit:hover { background: #276749; }
        .actions button:hover { background: #9b2c2c; }
        .match-card { display: block !important; padding: 0.75rem 1rem !important; }
        .match-meta { font-size: 0.82rem; color: #6b7280; margin-bottom: 0.25rem; }
        .match-teams { font-weight: 700; font-size: 1rem; color: #111827; margin-bottom: 0.2rem; }
        .match-players { font-size: 0.8rem; color: #4b5563; }
        .match-badge { display: inline-block; padding: 1px 7px; border-radius: 999px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; vertical-align: middle; margin-right: 4px; }
        .badge-prepared { background: #dbeafe; color: #1d4ed8; }
        .badge-running { background: #d1fae5; color: #065f46; }
        .badge-completed { background: #f3f4f6; color: #374151; }
        .match-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid #e5e7eb; }
        .match-actions button { padding: 0.28rem 0.8rem; font-size: 0.82rem; margin: 0; }
        .match-actions .btn-danger { background: #e53e3e; }
        .match-actions .btn-danger:hover { background: #9b2c2c; }
        .match-actions .btn-lock { background: #6b7280; }
        .match-actions .btn-lock:hover { background: #4b5563; }
        .match-actions .btn-lock.locked { background: #b45309; }
        .match-actions .btn-lock.locked:hover { background: #78350f; }
        .match-actions .btn-reset { background: #7c3aed; }
        .match-actions .btn-reset:hover { background: #5b21b6; }
        .match-filter-bar { display: flex; gap: 6px; margin: 1rem 0 0.5rem; }
        .filter-btn { background: #e5e7eb; color: #374151; border: none; border-radius: 6px; padding: 0.3rem 1rem; font-size: 0.85rem; font-weight: 600; cursor: pointer; margin: 0; }
        .filter-btn:hover { background: #d1d5db; }
        .filter-btn.active { background: #2563eb; color: #fff; }
        .filter-sep { width: 1px; background: #d1d5db; margin: 0 4px; }
        @media (max-width: 700px) { .admin-container { padding: 1rem 0.2rem; } }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>Ryder Admin</h1>
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="players-section" onclick="showTab('players-section')">Players</button>
            <button class="tab-btn" data-tab="teams-section" onclick="showTab('teams-section')">Teams</button>
            <button class="tab-btn" data-tab="matches-section" onclick="showTab('matches-section')">Matches</button>
            <button class="tab-btn" data-tab="rounds-section" onclick="showTab('rounds-section'); fetchRoundDates()">Kola</button>
        </div>
        <div class="section active" id="players-section">
            <h2>Players</h2>
            <form id="player-form">
                <input type="hidden" id="player-id">
                <label for="player-name">Name</label>
                <input type="text" id="player-name" required>
                <label for="player-email">Email</label>
                <input type="email" id="player-email">
                <label for="player-hcp">HCP</label>
                <input type="number" step="0.1" id="player-hcp">
                <label for="player-team">Team</label>
                <select id="player-team"></select>
                <button type="submit">Add Player</button>
            </form>
            <ul id="players-list"></ul>
        </div>
        <div class="section" id="teams-section">
            <h2>Teams</h2>
            <form id="team-form">
                <input type="hidden" id="team-id">
                <label for="team-name">Name</label>
                <input type="text" id="team-name" required>
                <label for="team-color">Color</label>
                <input type="color" id="team-color" value="#2563eb">
                <button type="submit">Add Team</button>
            </form>
            <ul id="teams-list"></ul>
        </div>
        <div class="section" id="matches-section">
            <h2>Matches</h2>
            <form id="match-form">
                <input type="hidden" id="match-id">
                <label for="match-date">Date</label>
                <input type="date" id="match-date" style="width:12em;">
                <label for="match-start-time">Start Time (h:mm)</label>
                <input type="text" id="match-start-time" pattern="^([0-9]{1,2}:[0-9]{2})$" placeholder="e.g. 8:30" style="width:7em;">
                <label for="match-round">Round</label>
                <input type="number" id="match-round" min="1" placeholder="e.g. 1" style="width:5em;" title="Tournament round number — leave blank for a standalone match">
                <label for="match-bracket-slot">Bracket position</label>
                <input type="number" id="match-bracket-slot" min="0" placeholder="e.g. 0" style="width:5em;" title="Slot/position within the round (0-based) — used to lay out the bracket tree">
                <label for="match-starting-hole">Starting Hole</label>
                <select id="match-starting-hole">
                    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                    <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                    <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                    <option value="10">10</option><option value="11">11</option><option value="12">12</option>
                    <option value="13">13</option><option value="14">14</option><option value="15">15</option>
                    <option value="16">16</option><option value="17">17</option><option value="18">18</option>
                </select>
                <label for="match-format">Format</label>
                <select id="match-format" required>
                    <option value="singles">Singles</option>
                    <option value="foursome">Foursome</option>
                    <option value="texas_scramble">Texas Scramble</option>
                </select>
                <label for="match-holes">Holes</label>
                <select id="match-holes" required>
                    <option value="18">18 Holes</option>
                    <option value="9">9 Holes</option>
                </select>
                <label for="match-team-a">Team A</label>
                <select id="match-team-a" required></select>
                <label for="match-team-b">Team B</label>
                <select id="match-team-b" required></select>
                <label for="match-players-a">Players for Team A</label>
                <select id="match-players-a" multiple required></select>
                <label for="match-players-b">Players for Team B</label>
                <select id="match-players-b" multiple required></select>
                <button type="submit">Add Match</button>
            </form>
            <div class="match-filter-bar">
                <button class="filter-btn active" data-filter="all" onclick="setMatchFilter('all')">All</button>
                <button class="filter-btn" data-filter="prepared" onclick="setMatchFilter('prepared')">Prepared</button>
                <button class="filter-btn" data-filter="running" onclick="setMatchFilter('running')">Running</button>
                <button class="filter-btn" data-filter="completed" onclick="setMatchFilter('completed')">Completed</button>
                <span class="filter-sep"></span>
                <button class="filter-btn" data-lock="locked" onclick="setLockFilter('locked')">Locked</button>
                <button class="filter-btn" data-lock="unlocked" onclick="setLockFilter('unlocked')">Unlocked</button>
            </div>
            <ul id="matches-list"></ul>
        </div>
        <div class="section" id="rounds-section">
            <h2>Kola — Termíny</h2>
            <div id="rounds-dates-list"></div>
        </div>
    </div>
</body>
</html>
